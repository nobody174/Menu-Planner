<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pop Art Diner — Vartdals Ukesmeny</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;600;700&display=swap');

    /* ── CSS Variables ── */
    :root {
      --color-bg:        #FFEB3B;
      --color-surface:   #FFFFFF;
      --color-primary:   #D32F2F;
      --color-accent:    #1565C0;
      --color-text:      #000000;
      --color-muted:     #333333;
      --color-border:    #000000;

      --font-heading:    'Bangers', cursive;
      --font-body:       'Inter', sans-serif;

      --border-thick:    3px solid var(--color-border);
      --border-thicker:  4px solid var(--color-border);
      --shadow-comic:    4px 4px 0 #000000;
      --radius:          0px;

      --space-xs:  0.35rem;
      --space-sm:  0.75rem;
      --space-md:  1.25rem;
      --space-lg:  2rem;
      --space-xl:  3rem;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: var(--font-body);
      background-color: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      /* Halftone dot pattern */
      background-image:
        radial-gradient(circle, #000 1px, transparent 1px);
      background-size: 18px 18px;
      background-position: 0 0;
    }

    /* ── Layout ── */
    .page-wrapper {
      max-width: 820px;
      margin: 0 auto;
      padding: var(--space-lg) var(--space-md);
    }

    /* ── Header ── */
    .site-header {
      background-color: var(--color-primary);
      border: var(--border-thicker);
      box-shadow: var(--shadow-comic);
      padding: var(--space-md) var(--space-lg);
      margin-bottom: var(--space-lg);
      position: relative;
    }

    .header-inner {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-sm);
    }

    .site-title {
      font-family: var(--font-heading);
      font-size: 2.8rem;
      letter-spacing: 0.04em;
      color: #FFEB3B;
      text-shadow: 2px 2px 0 #000;
      line-height: 1;
    }

    .week-range {
      font-family: var(--font-heading);
      font-size: 1.4rem;
      color: #FFFFFF;
      letter-spacing: 0.03em;
      background-color: var(--color-accent);
      border: var(--border-thick);
      padding: var(--space-xs) var(--space-sm);
      box-shadow: 2px 2px 0 #000;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4em;
      font-family: var(--font-heading);
      font-size: 1.1rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      border: var(--border-thicker);
      padding: 0.45em 1em;
      box-shadow: var(--shadow-comic);
      transition: transform 0.08s, box-shadow 0.08s;
      text-decoration: none;
      border-radius: var(--radius);
    }
    .btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 #000;
    }

    .btn-primary {
      background-color: var(--color-accent);
      color: #FFFFFF;
    }
    .btn-secondary {
      background-color: var(--color-surface);
      color: var(--color-text);
    }

    .header-actions {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-sm);
      align-items: center;
    }

    /* ── Card ── */
    .card-grid {
      margin-bottom: var(--space-lg);
    }

    .card {
      background-color: var(--color-surface);
      border: var(--border-thicker);
      box-shadow: var(--shadow-comic);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .card-header {
      background-color: var(--color-primary);
      border-bottom: var(--border-thicker);
      padding: var(--space-sm) var(--space-md);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-sm);
    }

    .card-day {
      font-family: var(--font-heading);
      font-size: 1.6rem;
      color: #FFFFFF;
      letter-spacing: 0.06em;
      text-shadow: 1px 1px 0 #000;
    }

    .card-time {
      font-family: var(--font-heading);
      font-size: 1.1rem;
      color: #FFEB3B;
      background-color: #000;
      padding: 2px 10px;
      letter-spacing: 0.04em;
    }

    .card-body {
      padding: var(--space-md);
    }

    .recipe-title {
      font-family: var(--font-heading);
      font-size: 2.2rem;
      color: var(--color-text);
      letter-spacing: 0.04em;
      line-height: 1.1;
      margin-bottom: var(--space-sm);
      text-shadow: 2px 2px 0 rgba(0,0,0,0.12);
    }

    .recipe-desc {
      font-size: 0.95rem;
      color: var(--color-muted);
      line-height: 1.55;
      margin-bottom: var(--space-md);
      border-left: 4px solid var(--color-accent);
      padding-left: var(--space-sm);
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-xs);
      margin-bottom: var(--space-md);
    }

    .tag {
      font-family: var(--font-heading);
      font-size: 0.9rem;
      letter-spacing: 0.06em;
      padding: 2px 10px;
      border: 2px solid var(--color-border);
      border-radius: var(--radius);
    }

    .tag-red  { background-color: var(--color-primary); color: #FFFFFF; }
    .tag-blue { background-color: var(--color-accent);  color: #FFFFFF; }

    .card-footer {
      border-top: var(--border-thick);
      padding: var(--space-sm) var(--space-md);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-sm);
      background-color: #FFEB3B;
    }

    .recipe-id {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--color-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ── Speech bubble decoration ── */
    .speech-bubble {
      position: relative;
      display: inline-block;
      background-color: var(--color-bg);
      border: var(--border-thicker);
      box-shadow: var(--shadow-comic);
      padding: var(--space-xs) var(--space-md);
      font-family: var(--font-heading);
      font-size: 1.5rem;
      letter-spacing: 0.05em;
      margin-bottom: var(--space-md);
    }
    .speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -14px;
      left: 24px;
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 6px solid transparent;
      border-top: 14px solid #000;
    }
    .speech-bubble::before {
      content: '';
      position: absolute;
      bottom: -11px;
      left: 25px;
      width: 0;
      height: 0;
      border-left: 9px solid transparent;
      border-right: 5px solid transparent;
      border-top: 12px solid var(--color-bg);
      z-index: 1;
    }

    /* ── Shopping list CTA ── */
    .shopping-cta {
      background-color: var(--color-accent);
      border: var(--border-thicker);
      box-shadow: var(--shadow-comic);
      padding: var(--space-md) var(--space-lg);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-md);
    }

    .shopping-cta-text {
      font-family: var(--font-heading);
      font-size: 1.6rem;
      color: #FFFFFF;
      letter-spacing: 0.04em;
      text-shadow: 1px 1px 0 #000;
    }
    .shopping-cta-sub {
      font-size: 0.88rem;
      color: rgba(255,255,255,0.85);
      margin-top: 2px;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .site-title { font-size: 2.2rem; }
      .recipe-title { font-size: 1.8rem; }
      .shopping-cta-text { font-size: 1.3rem; }
    }

    @media (max-width: 640px) {
      .page-wrapper { padding: var(--space-md) var(--space-sm); }
      .site-title { font-size: 1.9rem; }
      .header-inner { flex-direction: column; align-items: flex-start; }
      .recipe-title { font-size: 1.5rem; }
      .card-day { font-size: 1.3rem; }
      .shopping-cta { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="page-wrapper">

    <!-- Header -->
    <header class="site-header">
      <div class="header-inner">
        <div>
          <h1 class="site-title">Vartdals Ukesmeny</h1>
          <div class="week-range">WEEK_START – WEEK_END</div>
        </div>
        <div class="header-actions">
          <button class="btn btn-primary">&#9889; Generer ny meny</button>
          <button class="btn btn-secondary">&#128722; Handleliste</button>
        </div>
      </div>
    </header>

    <!-- Section label -->
    <div class="speech-bubble">Ukens middag!</div>

    <!-- Card -->
    <div class="card-grid">
      <article class="card">
        <div class="card-header">
          <span class="card-day">DAY_NAME</span>
          <span class="card-time">&#9201; TIME_MINUTES min</span>
        </div>
        <div class="card-body">
          <h2 class="recipe-title">RECIPE_TITLE</h2>
          <p class="recipe-desc">SHORT_DESC</p>
          <div class="tag-row">
            <span class="tag tag-red">CATEGORY_TAG_1</span>
            <span class="tag tag-blue">CATEGORY_TAG_2</span>
          </div>
        </div>
        <div class="card-footer">
          <span class="recipe-id">ID: RECIPE_ID</span>
          <button class="btn btn-primary">Se oppskrift &#8594;</button>
        </div>
      </article>
    </div>

    <!-- Shopping list CTA -->
    <div class="shopping-cta">
      <div>
        <div class="shopping-cta-text">&#128722; Klar til å handle?</div>
        <div class="shopping-cta-sub">Se full handleliste for hele uka</div>
      </div>
      <button class="btn btn-secondary">Åpne handleliste &#8594;</button>
    </div>

  </div>
</body>
</html>
