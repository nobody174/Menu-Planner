<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coastal Kitchen — Vartdals Ukesmeny</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap');

    /* ── CSS Variables ── */
    :root {
      --color-bg:        #F0F8F7;
      --color-surface:   #FFFFFF;
      --color-primary:   #2C5F5A;
      --color-accent:    #4AADA6;
      --color-secondary: #8B9E8D;
      --color-text:      #1E3A38;
      --color-muted:     #6B8A88;
      --color-border:    #C8E0DE;
      --color-wave-mid:  #D6EFED;

      --font-main: 'Nunito', sans-serif;

      --border-default: 1px solid var(--color-border);
      --radius-card:    16px;
      --radius-btn:     50px;
      --radius-tag:     50px;
      --shadow-card:    0 4px 20px rgba(44,95,90,0.1);
      --shadow-btn:     0 2px 10px rgba(44,95,90,0.2);

      --space-xs:  0.35rem;
      --space-sm:  0.75rem;
      --space-md:  1.25rem;
      --space-lg:  2rem;
      --space-xl:  3rem;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }

    body {
      font-family: var(--font-main);
      background-color: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
    }

    /* ── Layout ── */
    .page-wrapper {
      max-width: 820px;
      margin: 0 auto;
      padding: var(--space-lg) var(--space-md);
    }

    /* ── Header ── */
    .site-header {
      background-color: var(--color-primary);
      border-radius: var(--radius-card);
      padding: 0;
      margin-bottom: var(--space-lg);
      overflow: hidden;
      position: relative;
      box-shadow: var(--shadow-card);
    }

    /* Wave decoration using clip-path on a pseudo-element */
    .header-bg {
      padding: var(--space-md) var(--space-lg) calc(var(--space-lg) + 18px);
      position: relative;
    }

    .wave-divider {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      line-height: 0;
      overflow: hidden;
      height: 30px;
    }
    .wave-divider svg {
      display: block;
      width: 100%;
      height: 30px;
    }

    .header-inner {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-sm);
    }

    .site-title {
      font-size: 2rem;
      font-weight: 800;
      color: #FFFFFF;
      line-height: 1.1;
      letter-spacing: -0.01em;
    }

    .week-range {
      font-size: 0.9rem;
      font-weight: 600;
      color: rgba(255,255,255,0.8);
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 0.4em;
    }
    .week-range::before {
      content: '~';
      color: var(--color-accent);
      font-size: 1.1em;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.45em;
      font-family: var(--font-main);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      padding: 0.55em 1.3em;
      border-radius: var(--radius-btn);
      transition: transform 0.15s, box-shadow 0.15s, background-color 0.15s;
      text-decoration: none;
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-btn);
    }
    .btn:active {
      transform: translateY(0);
    }

    .btn-primary {
      background-color: #FFFFFF;
      color: var(--color-primary);
    }
    .btn-secondary {
      background-color: rgba(255,255,255,0.18);
      color: #FFFFFF;
      border: 1px solid rgba(255,255,255,0.4);
    }
    .btn-teal {
      background-color: var(--color-primary);
      color: #FFFFFF;
      box-shadow: var(--shadow-btn);
    }
    .btn-cta {
      background-color: var(--color-accent);
      color: #FFFFFF;
      box-shadow: var(--shadow-btn);
    }

    .header-actions {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-sm);
      align-items: center;
    }

    /* ── Driftwood divider ── */
    .driftwood-divider {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin-bottom: var(--space-md);
    }
    .driftwood-divider::before,
    .driftwood-divider::after {
      content: '';
      flex: 1;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--color-border), transparent);
      border-radius: 2px;
    }
    .driftwood-divider-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--color-secondary);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ── Card ── */
    .card-grid {
      margin-bottom: var(--space-lg);
    }

    .card {
      background-color: var(--color-surface);
      border: var(--border-default);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .card:hover {
      box-shadow: 0 6px 28px rgba(44,95,90,0.14);
    }

    /* Seafoam top accent stripe */
    .card-accent-stripe {
      height: 5px;
      background: linear-gradient(90deg, var(--color-accent), var(--color-primary));
    }

    .card-header {
      padding: var(--space-sm) var(--space-md);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-sm);
      border-bottom: var(--border-default);
    }

    .card-day {
      font-size: 1rem;
      font-weight: 800;
      color: var(--color-primary);
      letter-spacing: 0.02em;
    }

    .card-time {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--color-muted);
      background-color: var(--color-bg);
      border: var(--border-default);
      border-radius: 50px;
      padding: 3px 12px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .card-time::before { content: '⏱'; font-size: 0.85em; }

    .card-body {
      padding: var(--space-md) var(--space-md) var(--space-sm);
    }

    .recipe-title {
      font-size: 1.7rem;
      font-weight: 800;
      color: var(--color-text);
      line-height: 1.2;
      margin-bottom: var(--space-sm);
      letter-spacing: -0.01em;
    }

    .recipe-desc {
      font-size: 0.95rem;
      color: var(--color-muted);
      line-height: 1.6;
      margin-bottom: var(--space-md);
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-xs);
      margin-bottom: var(--space-sm);
    }

    .tag {
      font-size: 0.78rem;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: var(--radius-tag);
      letter-spacing: 0.03em;
    }

    .tag-seafoam {
      background-color: rgba(74,173,166,0.12);
      color: var(--color-accent);
      border: 1px solid rgba(74,173,166,0.3);
    }
    .tag-sage {
      background-color: rgba(139,158,141,0.12);
      color: var(--color-secondary);
      border: 1px solid rgba(139,158,141,0.3);
    }

    .card-footer {
      border-top: var(--border-default);
      padding: var(--space-sm) var(--space-md);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-sm);
      background-color: #FAFEFE;
    }

    .recipe-id {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--color-muted);
    }

    /* ── Shopping list CTA ── */
    .shopping-cta {
      background: linear-gradient(135deg, var(--color-primary), #1E4A46);
      border-radius: var(--radius-card);
      padding: var(--space-md) var(--space-lg);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-md);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      position: relative;
    }

    /* Wave-like decoration inside CTA */
    .shopping-cta::before {
      content: '';
      position: absolute;
      top: -30px;
      right: -30px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background-color: rgba(74,173,166,0.15);
    }
    .shopping-cta::after {
      content: '';
      position: absolute;
      bottom: -40px;
      right: 40px;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background-color: rgba(255,255,255,0.06);
    }

    .shopping-cta-text {
      font-size: 1.3rem;
      font-weight: 800;
      color: #FFFFFF;
      position: relative;
    }
    .shopping-cta-sub {
      font-size: 0.88rem;
      font-weight: 500;
      color: rgba(255,255,255,0.75);
      margin-top: 3px;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .site-title { font-size: 1.65rem; }
      .recipe-title { font-size: 1.4rem; }
      .shopping-cta-text { font-size: 1.1rem; }
    }

    @media (max-width: 640px) {
      .page-wrapper { padding: var(--space-md) var(--space-sm); }
      .site-title { font-size: 1.4rem; }
      .header-inner { flex-direction: column; align-items: flex-start; }
      .recipe-title { font-size: 1.25rem; }
      .shopping-cta { flex-direction: column; align-items: flex-start; }
      .header-actions { flex-direction: column; align-items: flex-start; width: 100%; }
    }
  </style>
</head>
<body>
  <div class="page-wrapper">

    <!-- Header -->
    <header class="site-header">
      <div class="header-bg">
        <div class="header-inner">
          <div>
            <h1 class="site-title">Vartdals Ukesmeny</h1>
            <div class="week-range">WEEK_START – WEEK_END</div>
          </div>
          <div class="header-actions">
            <button class="btn btn-primary">&#8635; Generer ny meny</button>
            <button class="btn btn-secondary">&#128722; Handleliste</button>
          </div>
        </div>
        <div class="wave-divider">
          <svg viewBox="0 0 1200 30" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0,15 C150,30 300,0 450,15 C600,30 750,0 900,15 C1050,30 1150,8 1200,15 L1200,30 L0,30 Z" fill="#F0F8F7"/>
          </svg>
        </div>
      </div>
    </header>

    <!-- Divider -->
    <div class="driftwood-divider">
      <span class="driftwood-divider-label">Ukens middag</span>
    </div>

    <!-- Card -->
    <div class="card-grid">
      <article class="card">
        <div class="card-accent-stripe"></div>
        <div class="card-header">
          <span class="card-day">DAY_NAME</span>
          <span class="card-time">TIME_MINUTES min</span>
        </div>
        <div class="card-body">
          <h2 class="recipe-title">RECIPE_TITLE</h2>
          <p class="recipe-desc">SHORT_DESC</p>
          <div class="tag-row">
            <span class="tag tag-seafoam">CATEGORY_TAG_1</span>
            <span class="tag tag-sage">CATEGORY_TAG_2</span>
          </div>
        </div>
        <div class="card-footer">
          <span class="recipe-id">RECIPE_ID</span>
          <button class="btn btn-teal">Se oppskrift &#8594;</button>
        </div>
      </article>
    </div>

    <!-- Shopping list CTA -->
    <div class="shopping-cta">
      <div>
        <div class="shopping-cta-text">&#128722; Klar til å handle?</div>
        <div class="shopping-cta-sub">Se full handleliste for hele uka</div>
      </div>
      <button class="btn btn-cta">Åpne handleliste &#8594;</button>
    </div>

  </div>
</body>
</html>
