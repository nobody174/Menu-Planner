{% extends "base.html" %}

{% block title %}{{ t.error }} - {{ household_name }}{% endblock %}

{% block content %}
<div class="error-container">
    <div class="error-box">
        <h1>Oops!</h1>
        <p class="error-message">{{ message }}</p>
        <a href="/" class="btn btn-primary">{{ t.back_to_menu }}</a>
    </div>
</div>
{% endblock %}
