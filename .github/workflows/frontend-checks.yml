name: Frontend Checks

on:
  push:
    branches: [ master, public-release-v1, develop ]
  pull_request:
    branches: [ master, public-release-v1, develop ]

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install frontend tools
      run: npm install -g eslint

    - name: Validate HTML templates
      run: python .github/scripts/validate_html.py

    - name: Check CSS files exist
      run: python .github/scripts/check_css.py

    - name: Check i18n translations
      run: python .github/scripts/validate_i18n.py
