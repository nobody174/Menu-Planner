name: Code Quality & Linting

on:
  push:
    branches: [ master, public-release-v1, develop ]
  pull_request:
    branches: [ master, public-release-v1, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint flake8 black isort

    - name: Check code formatting with Black
      run: |
        black --check --diff core/ pi-deployment/ scripts/ || true

    - name: Run Flake8 linting
      run: |
        flake8 core/ pi-deployment/ scripts/ --max-line-length=120 --ignore=E203,W503 || true

    - name: Run Pylint
      run: |
        pylint core/ pi-deployment/ --fail-under=7.0 || true

    - name: Check import sorting with isort
      run: |
        isort --check-only --diff core/ pi-deployment/ scripts/ || true
