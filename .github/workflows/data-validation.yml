name: Data Validation

on:
  push:
    branches: [ master, public-release-v1, develop ]
  pull_request:
    branches: [ master, public-release-v1, develop ]

jobs:
  data:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Validate all JSON files
      run: python .github/scripts/validate_json.py

    - name: Validate recipe data structure
      run: python .github/scripts/validate_recipes.py

    - name: Validate theme registry
      run: python .github/scripts/validate_themes.py

    - name: Validate i18n completeness
      run: python .github/scripts/validate_i18n.py
