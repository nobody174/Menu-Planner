name: Release & Deployment

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install build twine

    - name: Validate release
      run: |
        python -c "import json; registry = json.load(open('frontend/static/themes/previews/theme-registry.json')); assert len(registry) > 0, 'Theme registry is empty'; print(f'Release validation passed ({len(registry)} themes)')"

    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        body: |
          ## Menu Planner Release

          See [README](README.md) for installation and usage.
        draft: false
        prerelease: false

    - name: Notify on successful release
      run: |
        echo "✓ Release ${{ github.ref }} created successfully"
