name: CI/CD Pipeline

on:
  push:
    branches: [ main, public-release-v1 ]
  pull_request:
    branches: [ main, public-release-v1 ]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ---------------------------------------------------------------------
  # Stage 1: fast, cheap checks. Fail here before spending time on Stage 2.
  # ---------------------------------------------------------------------
  lint:
    name: "Stage 1: Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: |
          python -m pip install --upgrade pip
          pip install flake8 black
      - name: Flake8 (fails the build on real errors)
        run: flake8 deployment core database --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Flake8 (style, reported but non-blocking)
        run: flake8 deployment core database --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      - name: Black formatting check
        run: black --check --diff deployment core database

  data-validation:
    name: "Stage 1: Data Validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - run: python .github/scripts/validate_json.py
      - run: python .github/scripts/validate_recipes.py
      - run: python .github/scripts/validate_themes.py
      - run: python .github/scripts/validate_i18n.py

  frontend-checks:
    name: "Stage 1: Frontend Checks"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: python .github/scripts/validate_html.py
      - run: python .github/scripts/check_css.py

  # ---------------------------------------------------------------------
  # Stage 2: expensive verification. Only runs once Stage 1 is green.
  # ---------------------------------------------------------------------
  test:
    name: "Stage 2: Tests"
    runs-on: ubuntu-latest
    needs: [lint, data-validation, frontend-checks]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: menu_planner_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/menu_planner_test
        run: alembic upgrade head
      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/menu_planner_test
          FLASK_ENV: testing
          FLASK_SECRET_KEY: test-secret-key
        run: pytest tests/ -v --cov=deployment --cov=core --cov=database --cov-report=xml --cov-report=term
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
      - name: Verify Flask app imports
        run: python -c "from deployment.flask_app import app; print('Flask app imported successfully')"

  security:
    name: "Stage 2: Security Scan"
    runs-on: ubuntu-latest
    needs: [lint, data-validation, frontend-checks]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit
      - name: Bandit (fails on high-severity findings only)
        run: bandit -r core/ deployment/ --severity-level high
      - name: Dependency vulnerability scan (fails the build on any finding)
        # B54: previously used `safety check || true`. Two problems with
        # that: (1) `|| true` meant a CVE finding never actually failed the
        # build, just got logged; (2) modern `safety` (v3.x) requires
        # signing in to Safety's own hosted platform to run at all, so this
        # step may well have been silently failing to even authenticate in
        # CI and falling through to `|| true` regardless of findings.
        # pip-audit (PyPI's own recommended tool, backed by the OSV
        # database) needs no account/API key and actually gates the build.
        run: pip-audit -r requirements.txt

  build:
    name: "Stage 2: Build Check"
    runs-on: ${{ matrix.os }}
    needs: [lint, data-validation, frontend-checks]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - run: python .github/scripts/verify_flask.py
      - run: python .github/scripts/verify_core.py
      - run: python .github/scripts/check_data_files.py

  playwright:
    name: "Stage 2: Visual Regression (Playwright)"
    runs-on: ubuntu-latest
    needs: [lint, data-validation, frontend-checks]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Seed e2e test data
        env:
          DATABASE_URL: sqlite:///e2e_test.db
        run: python e2e/seed_test_data.py
      - name: Run Playwright visual regression suite
        env:
          DATABASE_URL: sqlite:///e2e_test.db
          FLASK_SECRET_KEY: e2e-test-secret-key
          CI: true
        run: npx playwright test
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
      - name: Upload actual screenshots (for baseline bootstrap/updates)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14

  # ---------------------------------------------------------------------
  # Stage 3: deploy. Only on a real push (not PRs) to public-release-v1,
  # and only once every Stage 2 job is green.
  # ---------------------------------------------------------------------
  deploy:
    name: "Stage 3: Deploy to Render"
    runs-on: ubuntu-latest
    needs: [test, security, build, playwright]
    if: github.ref == 'refs/heads/public-release-v1' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trigger Render deploy
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_URL secret is not set - skipping deploy trigger"
            exit 1
          fi
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Wait for live health check
        run: |
          echo "Waiting for menuplanner.no to report healthy..."
          for i in $(seq 1 20); do
            if curl -fsS https://menuplanner.no/health | grep -q '"status":"healthy"'; then
              echo "Healthy."
              exit 0
            fi
            sleep 15
          done
          echo "::error::Site did not report healthy within 5 minutes of triggering deploy"
          exit 1

      - name: Post deployment message
        run: echo "Triggered and confirmed Render deploy for menuplanner.no"

      - name: Auto-tag patch version
        id: autotag
        run: |
          git fetch --tags
          latest=$(git tag -l 'v*.*.*' | sort -V | tail -n1)
          if [ -z "$latest" ]; then
            new_tag="v1.0.0"
          else
            major=$(echo "$latest" | sed 's/^v//' | cut -d. -f1)
            minor=$(echo "$latest" | sed 's/^v//' | cut -d. -f2)
            patch=$(echo "$latest" | sed 's/^v//' | cut -d. -f3)
            new_tag="v${major}.${minor}.$((patch + 1))"
          fi
          echo "Latest tag: ${latest:-none}. Tagging deploy as $new_tag."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$new_tag" -m "Auto-tagged deploy to menuplanner.no"
          git push origin "$new_tag"
          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        # release.yml (tag-triggered) never actually fires for this tag:
        # GITHUB_TOKEN-authored pushes are deliberately excluded from
        # triggering other workflows (GitHub's anti-loop protection), so
        # every auto-tagged push here was silently invisible to it -
        # confirmed via `gh run list --workflow=release.yml`, zero runs
        # ever fired from a tag push despite the tags existing on GitHub.
        # Creating the Release directly in this same job sidesteps the
        # cross-workflow trigger entirely rather than fighting it.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.autotag.outputs.new_tag }}" \
            --title "Release ${{ steps.autotag.outputs.new_tag }}" \
            --notes "Auto-deployed to menuplanner.no. See CHANGELOG.md for details."
