name: Build & Dependencies

on:
  push:
    branches: [ master, public-release-v1, develop ]
  pull_request:
    branches: [ master, public-release-v1, develop ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify Flask app imports
      run: python .github/scripts/verify_flask.py

    - name: Verify core modules
      run: python .github/scripts/verify_core.py

    - name: Check required data files
      run: python .github/scripts/check_data_files.py
